version: '3.8'

services:
  backend:
    build: ./backend
    container_name: stream-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - PORT=5000

  frontend:
    build: 
      context: ./frontend
      args:
        # Pass the domain representing your backend URL here.
        VITE_SOCKET_URL: https://zora.run.place
    container_name: stream-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
