services:
  livekit:
    image: livekit/livekit-server:latest
    container_name: stream-livekit
    restart: unless-stopped
    command: --config /etc/livekit.yaml --node-ip 0.0.0.0
    ports:
      - "7880:7880"
      - "7881:7881"
      - "50000-60000:50000-60000/udp"
    volumes:
      - ./livekit.yaml:/etc/livekit.yaml

  backend:
    build: ./backend
    container_name: stream-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - LIVEKIT_API_KEY=APIzora2026stream
      - LIVEKIT_API_SECRET=secretZoraLiveKit2026xRunPlace
      - LIVEKIT_URL=ws://livekit:7880
    depends_on:
      - livekit

  frontend:
    build: 
      context: ./frontend
      args:
        VITE_SOCKET_URL: https://zora.run.place
    container_name: stream-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
